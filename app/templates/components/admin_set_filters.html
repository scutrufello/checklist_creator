{% macro admin_set_filter_bar(form_action, q='', rel_type='', relationship_types=(), show_confidence=false, max_conf=0.85, limit=500, year=none, product='') %}
<form method="get" action="{{ form_action }}" class="bg-base-100 border border-base-200 rounded-lg p-4 mb-4 flex flex-wrap gap-3 items-end">
    <label class="form-control flex-1 min-w-[12rem]">
        <span class="label-text text-xs">Set name</span>
        <input type="search" name="q" value="{{ q }}" placeholder="Search name or variant…" class="input input-sm input-bordered w-full">
    </label>
    <label class="form-control">
        <span class="label-text text-xs">Type</span>
        <select name="rel_type" class="select select-sm select-bordered w-36">
            {% if not show_confidence %}
            <option value="" {% if not rel_type %}selected{% endif %}>All (non-base)</option>
            {% else %}
            <option value="" {% if not rel_type %}selected{% endif %}>Low-confidence parallels</option>
            {% endif %}
            {% for t in relationship_types %}
            <option value="{{ t }}" {% if rel_type == t %}selected{% endif %}>{{ t }}</option>
            {% endfor %}
        </select>
    </label>
    {% if year is not none %}
    <label class="form-control">
        <span class="label-text text-xs">Year</span>
        <input type="number" name="year" value="{{ year if year is not none else '' }}" class="input input-sm input-bordered w-28">
    </label>
    {% endif %}
    {% if product %}
    <input type="hidden" name="product" value="{{ product }}">
    {% endif %}
    {% if show_confidence %}
    <label class="form-control">
        <span class="label-text text-xs">Max confidence</span>
        <input type="number" step="0.01" min="0" max="1" name="max_conf" value="{{ max_conf }}" class="input input-sm input-bordered w-28">
    </label>
    {% endif %}
    <label class="form-control">
        <span class="label-text text-xs">Limit</span>
        <input type="number" min="1" max="2000" name="limit" value="{{ limit }}" class="input input-sm input-bordered w-24">
    </label>
    <button class="btn btn-sm btn-primary">Filter</button>
</form>
{% endmacro %}
