<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Phillies Cards Checklist{% endblock %}</title>
    <script>
        (function () {
            var key = "phillies-theme";
            var saved = localStorage.getItem(key);
            var theme = saved === "dark" ? "dark" : "light";
            document.documentElement.setAttribute("data-theme", theme);
        })();
    </script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.22/dist/full.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'phillies-red': '#E81828',
                        'phillies-blue': '#002D72',
                        'phillies-cream': '#F5F0E8',
                    }
                }
            }
        }
    </script>
    <style>
        html[data-theme="light"] body {
            background-color: #F5F0E8;
        }
        html[data-theme="dark"] body {
            background-color: #0c1526;
        }
        /* Navy blue text on dark grey surfaces is hard to read — lighten accents in dark mode. */
        html[data-theme="dark"] {
            --phillies-blue-text: #b8d4ff;
            --phillies-blue-text-soft: #93b8f7;
        }
        html[data-theme="dark"] [class*="text-phillies-blue"] {
            color: var(--phillies-blue-text);
        }
        html[data-theme="dark"] a[class*="text-phillies-blue"]:hover,
        html[data-theme="dark"] .link[class*="text-phillies-blue"]:hover {
            color: #fca5a5;
        }
        html[data-theme="dark"] .hover\:border-phillies-blue\/30:hover {
            border-color: rgb(147 184 247 / 0.45);
        }
        html[data-theme="dark"] .bg-phillies-blue {
            background-color: #1e3a6e;
        }
        .phillies-gradient {
            background: linear-gradient(135deg, #002D72 0%, #E81828 100%);
        }
        html[data-theme="light"] .card-row-owned {
            background-color: #dcfce7;
        }
        html[data-theme="dark"] .card-row-owned {
            background-color: rgba(34, 197, 94, 0.14);
        }
        html[data-theme="light"] .card-row-wants-upgrade {
            background-color: #fef9c3;
        }
        html[data-theme="dark"] .card-row-wants-upgrade {
            background-color: rgba(234, 179, 8, 0.18);
        }
        html[data-missing-only="true"] tr.card-row[data-owned="true"] {
            display: none;
        }
        html[data-missing-only="true"] .card-binder-cell[data-owned="true"] {
            display: none;
        }
        html[data-view-mode="binder"] [data-checklist-table] {
            display: none;
        }
        html:not([data-view-mode="binder"]) [data-checklist-binder] {
            display: none;
        }
        html[data-view-mode="binder"] .view-mode-btn[data-view-mode-toggle="binder"] {
            background-color: rgb(0 45 114 / 0.12);
            color: #002D72;
            font-weight: 600;
        }
        html[data-theme="dark"][data-view-mode="binder"] .view-mode-btn[data-view-mode-toggle="binder"] {
            background-color: rgb(147 184 247 / 0.18);
            color: #b8d4ff;
        }
        html:not([data-view-mode="binder"]) .view-mode-btn[data-view-mode-toggle="table"] {
            background-color: rgb(0 45 114 / 0.12);
            color: #002D72;
            font-weight: 600;
        }
        html[data-theme="dark"]:not([data-view-mode="binder"]) .view-mode-btn[data-view-mode-toggle="table"] {
            background-color: rgb(147 184 247 / 0.18);
            color: #b8d4ff;
        }
        html[data-view-mode="binder"] main.container {
            max-width: 56rem;
        }
        [data-card-image-flip]:focus-visible {
            outline: 2px solid rgb(0 45 114 / 0.55);
            outline-offset: 2px;
        }
        html[data-theme="dark"] [data-card-image-flip]:focus-visible {
            outline-color: rgb(147 184 247 / 0.65);
        }
        #card-image-lightbox {
            display: none;
        }
        #card-image-lightbox.is-open {
            display: flex;
        }
        #card-image-lightbox .card-lightbox-backdrop {
            background: rgb(0 0 0 / 0.72);
            backdrop-filter: blur(2px);
        }
        #card-image-lightbox .card-lightbox-img {
            max-height: min(78vh, 720px);
            max-width: min(92vw, 520px);
        }
        #card-image-lightbox .card-lightbox-img.is-loading {
            opacity: 0.35;
        }
        .progress-fill {
            transition: width 0.3s ease;
        }
        #theme-toggle .theme-icon-dark,
        html[data-theme="dark"] #theme-toggle .theme-icon-light {
            display: none;
        }
        html[data-theme="dark"] #theme-toggle .theme-icon-dark {
            display: block;
        }
        @media (max-width: 640px) {
            .card-number { min-width: 3rem; }
        }
    </style>
</head>
<body class="min-h-screen text-base-content" hx-boost="true">
    <nav class="navbar phillies-gradient shadow-lg sticky top-0 z-50 min-h-[4rem] py-2">
        <div class="container mx-auto px-4 flex flex-wrap items-center gap-3 w-full">
            <div class="flex-shrink-0">
                <a href="/" class="text-xl sm:text-2xl font-bold text-white tracking-wide flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
                    </svg>
                    <span class="hidden sm:inline">Phillies Cards</span>
                    <span class="sm:hidden">Phillies</span>
                </a>
            </div>
            <div class="flex-1 min-w-0 max-w-md order-3 sm:order-none w-full sm:w-auto basis-full sm:basis-auto">
                <div class="relative z-[60]" id="nav-search-wrap">
                    <label class="input input-sm input-bordered bg-base-100/95 flex items-center gap-2 w-full shadow-sm border-0">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 shrink-0 text-base-content/50" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                        </svg>
                        <input type="search"
                               name="q"
                               placeholder="Search cards…"
                               autocomplete="off"
                               spellcheck="false"
                               class="grow min-w-0 text-base-content placeholder:text-base-content/40"
                               hx-get="/partials/search"
                               hx-trigger="keyup changed delay:300ms, search"
                               hx-target="#search-results"
                        />
                    </label>
                    <div id="search-results" class="absolute left-0 right-0 top-full mt-1 empty:hidden"></div>
                </div>
            </div>
            <div class="flex-none flex items-center gap-2 ml-auto">
                <button type="button"
                        id="theme-toggle"
                        class="btn btn-ghost btn-sm btn-square text-white border border-white/20 hover:bg-white/10"
                        aria-label="Toggle dark mode"
                        title="Toggle dark mode">
                    <svg class="theme-icon-light h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                    </svg>
                    <svg class="theme-icon-dark h-5 w-5 hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                    </svg>
                </button>
                <a href="/admin" class="btn btn-ghost btn-sm text-white hidden sm:inline-flex border border-white/20 hover:bg-white/10">Admin</a>
                <a href="/need" class="btn btn-ghost btn-sm text-white hidden sm:inline-flex border border-white/20 hover:bg-white/10">Need</a>
                <a href="/search" class="btn btn-ghost btn-sm text-white hidden sm:inline-flex border border-white/20 hover:bg-white/10">Browse</a>
                {% block nav_right %}{% endblock %}
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-6 max-w-5xl">
        {% block breadcrumb %}{% endblock %}
        {% block content %}{% endblock %}
    </main>

    <footer class="footer footer-center p-4 text-base-content/60 text-sm mt-8">
        <p>Phillies Cards Checklist &mdash; Data from TCDB</p>
    </footer>

    <div id="card-image-lightbox"
         class="fixed inset-0 z-[100] flex items-center justify-center p-4"
         role="dialog"
         aria-modal="true"
         aria-labelledby="card-lightbox-caption"
         hidden>
        <div class="card-lightbox-backdrop absolute inset-0" data-lightbox-close tabindex="-1" aria-hidden="true"></div>
        <div class="relative z-10 w-full max-w-lg flex flex-col items-center gap-3 pointer-events-none">
            <div class="pointer-events-auto w-full flex flex-col items-center gap-3 bg-base-100 rounded-xl shadow-2xl border border-base-300 p-4 sm:p-5 max-h-[92vh]">
                <div class="w-full flex items-start justify-between gap-2">
                    <span id="card-lightbox-badge" class="badge badge-sm badge-outline">Front</span>
                    <button type="button"
                            class="btn btn-sm btn-circle btn-ghost shrink-0"
                            data-lightbox-close
                            aria-label="Close image viewer">✕</button>
                </div>
                <div class="relative w-full flex items-center justify-center min-h-[12rem] bg-base-200/60 rounded-lg border border-base-300/80 px-2 py-3">
                    <span id="card-lightbox-spinner" class="loading loading-spinner loading-md text-base-content/40 absolute hidden" aria-hidden="true"></span>
                    <img id="card-lightbox-img"
                         class="card-lightbox-img w-auto h-auto object-contain mx-auto"
                         alt="">
                </div>
                <p id="card-lightbox-caption" class="text-sm text-center text-base-content/90 leading-snug px-1"></p>
                <div class="w-full flex items-center justify-between gap-2">
                    <button type="button"
                            id="card-lightbox-prev"
                            class="btn btn-sm btn-ghost gap-1"
                            aria-label="Show back">
                        ← Back
                    </button>
                    <p class="text-[11px] text-base-content/45 text-center hidden sm:block">← → or F / B · Esc to close</p>
                    <button type="button"
                            id="card-lightbox-next"
                            class="btn btn-sm btn-ghost gap-1"
                            aria-label="Show front">
                        Front →
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function () {
            var key = "phillies-theme";
            var btn = document.getElementById("theme-toggle");
            if (!btn) return;
            btn.addEventListener("click", function () {
                var next = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
                document.documentElement.setAttribute("data-theme", next);
                localStorage.setItem(key, next);
            });
        })();
    </script>
    <script>
        (function () {
            var KEY = "phillies-missing-only";

            function isOn() {
                return document.documentElement.getAttribute("data-missing-only") === "true";
            }

            function setOn(on) {
                document.documentElement.setAttribute("data-missing-only", on ? "true" : "false");
                localStorage.setItem(KEY, on ? "true" : "false");
                document.querySelectorAll("[data-missing-only-toggle]").forEach(function (el) {
                    el.checked = on;
                });
                updateAll();
            }

            function countMissing(wrapper) {
                var missing = 0;
                var total = 0;
                wrapper.querySelectorAll("tbody tr.card-row").forEach(function (row) {
                    total += 1;
                    if (row.getAttribute("data-owned") === "false") missing += 1;
                });
                return { missing: missing, total: total };
            }

            function updateWrapper(wrapper) {
                var counts = countMissing(wrapper);
                var emptyEl = wrapper.querySelector("[data-missing-only-empty]");
                if (emptyEl) {
                    var showEmpty = isOn() && counts.total > 0 && counts.missing === 0;
                    emptyEl.classList.toggle("hidden", !showEmpty);
                }
                var countEl = wrapper.querySelector("[data-missing-only-count]");
                if (countEl) {
                    countEl.textContent = isOn() ? String(counts.missing) + " missing" : "";
                    countEl.classList.toggle("hidden", !isOn());
                }
            }

            function updatePageStatus() {
                var status = document.querySelector("[data-missing-only-page-status]");
                if (!status) return;
                var missing = 0;
                document.querySelectorAll("[data-missing-only-table]").forEach(function (wrapper) {
                    missing += countMissing(wrapper).missing;
                });
                if (isOn()) {
                    status.textContent = "Showing " + missing + " missing";
                    status.classList.remove("hidden");
                } else {
                    status.classList.add("hidden");
                }
            }

            function updateAll() {
                document.querySelectorAll("[data-missing-only-table]").forEach(updateWrapper);
                updatePageStatus();
            }

            function initToggles() {
                document.querySelectorAll("[data-missing-only-toggle]").forEach(function (el) {
                    if (el.dataset.bound) return;
                    el.dataset.bound = "1";
                    el.addEventListener("change", function () {
                        setOn(el.checked);
                    });
                });
            }

            var saved = localStorage.getItem(KEY) === "true";
            document.documentElement.setAttribute("data-missing-only", saved ? "true" : "false");
            initToggles();
            document.querySelectorAll("[data-missing-only-toggle]").forEach(function (el) {
                el.checked = saved;
            });
            updateAll();

            document.body.addEventListener("htmx:afterSwap", function () {
                initToggles();
                updateAll();
            });
        })();
    </script>
    <script>
        (function () {
            var KEY = "phillies-view-mode";

            function setViewMode(mode) {
                mode = mode === "binder" ? "binder" : "table";
                document.documentElement.setAttribute("data-view-mode", mode);
                localStorage.setItem(KEY, mode);
                document.querySelectorAll("[data-view-mode-toggle]").forEach(function (btn) {
                    var active = btn.getAttribute("data-view-mode-toggle") === mode;
                    btn.setAttribute("aria-pressed", active ? "true" : "false");
                });
            }

            function initViewModeToggles() {
                document.querySelectorAll("[data-view-mode-toggle]").forEach(function (btn) {
                    if (btn.dataset.bound) return;
                    btn.dataset.bound = "1";
                    btn.addEventListener("click", function () {
                        setViewMode(btn.getAttribute("data-view-mode-toggle"));
                    });
                });
            }

            var saved = localStorage.getItem(KEY);
            setViewMode(saved === "binder" ? "binder" : "table");
            initViewModeToggles();

            document.body.addEventListener("htmx:afterSwap", function () {
                initViewModeToggles();
            });
        })();
    </script>
    <script>
        (function () {
            function flipCardImage(el) {
                var back = el.getAttribute("data-back-url");
                if (!back) return;
                var img = el.querySelector("[data-card-flip-img]");
                if (!img) return;
                var front = el.getAttribute("data-front-url");
                var showing = el.getAttribute("data-showing") || "front";
                if (showing === "front") {
                    img.src = back;
                    el.setAttribute("data-showing", "back");
                    el.setAttribute("title", "Click to show front");
                    el.setAttribute("aria-label", "Card image, back. Click to show front.");
                } else {
                    img.src = front;
                    el.setAttribute("data-showing", "front");
                    el.setAttribute("title", "Click to show back");
                    el.setAttribute("aria-label", "Card image, front. Click to show back.");
                }
            }

            document.addEventListener("click", function (e) {
                var el = e.target.closest("[data-card-image-flip]");
                if (!el) return;
                e.preventDefault();
                flipCardImage(el);
            });

            document.addEventListener("keydown", function (e) {
                if (e.key !== "Enter" && e.key !== " ") return;
                var el = e.target.closest("[data-card-image-flip]");
                if (!el) return;
                e.preventDefault();
                flipCardImage(el);
            });
        })();
    </script>
    <script>
        (function () {
            var lightbox = document.getElementById("card-image-lightbox");
            if (!lightbox) return;

            var img = document.getElementById("card-lightbox-img");
            var captionEl = document.getElementById("card-lightbox-caption");
            var badgeEl = document.getElementById("card-lightbox-badge");
            var spinner = document.getElementById("card-lightbox-spinner");
            var prevBtn = document.getElementById("card-lightbox-prev");
            var nextBtn = document.getElementById("card-lightbox-next");

            var state = {
                frontUrl: "",
                backUrl: "",
                side: "front",
                captionBase: "",
                lastFocus: null,
            };

            function hasBoth() {
                return Boolean(state.frontUrl && state.backUrl);
            }

            function resolveCaption(group) {
                var cap = group.getAttribute("data-caption") || "";
                if (cap.indexOf(" — ") === -1) {
                    var views = group.closest("[data-checklist-views]");
                    var setName = views && views.getAttribute("data-set-name");
                    if (setName) cap += " — " + setName;
                }
                return cap;
            }

            function sideLabel(side) {
                return side === "back" ? "Back" : "Front";
            }

            function updateNav() {
                var both = hasBoth();
                prevBtn.classList.toggle("invisible", !both);
                nextBtn.classList.toggle("invisible", !both);
                prevBtn.disabled = !both;
                nextBtn.disabled = !both;
            }

            function setLoading(on) {
                spinner.classList.toggle("hidden", !on);
                img.classList.toggle("is-loading", on);
            }

            function renderSide() {
                var url = state.side === "back" ? state.backUrl : state.frontUrl;
                if (!url) return;
                setLoading(true);
                img.alt = state.captionBase + " (" + sideLabel(state.side).toLowerCase() + ")";
                img.src = url;
                badgeEl.textContent = sideLabel(state.side);
                captionEl.textContent = state.captionBase + " (" + sideLabel(state.side).toLowerCase() + ")";
                updateNav();
            }

            function flipSide(nextSide) {
                if (nextSide === "back" && !state.backUrl) return;
                if (nextSide === "front" && !state.frontUrl) return;
                state.side = nextSide;
                renderSide();
            }

            function toggleSide() {
                if (!hasBoth()) return;
                flipSide(state.side === "front" ? "back" : "front");
            }

            function openFromGroup(group, side) {
                var front = group.getAttribute("data-front-url") || "";
                var back = group.getAttribute("data-back-url") || "";
                if (!front && !back) return;

                state.frontUrl = front;
                state.backUrl = back;
                state.captionBase = resolveCaption(group);
                state.side = side === "back" && back ? "back" : "front";
                state.lastFocus = document.activeElement;

                renderSide();
                lightbox.hidden = false;
                lightbox.classList.add("is-open");
                document.body.style.overflow = "hidden";
                lightbox.querySelector("[data-lightbox-close].btn").focus();
            }

            function closeLightbox() {
                if (lightbox.hidden) return;
                lightbox.classList.remove("is-open");
                lightbox.hidden = true;
                document.body.style.overflow = "";
                img.removeAttribute("src");
                setLoading(false);
                if (state.lastFocus && typeof state.lastFocus.focus === "function") {
                    state.lastFocus.focus();
                }
            }

            img.addEventListener("load", function () {
                setLoading(false);
            });
            img.addEventListener("error", function () {
                setLoading(false);
            });

            document.addEventListener("click", function (e) {
                var openBtn = e.target.closest("[data-card-lightbox-open]");
                if (openBtn) {
                    e.preventDefault();
                    var group = openBtn.closest("[data-card-lightbox-group]");
                    if (!group) return;
                    openFromGroup(group, openBtn.getAttribute("data-side") || "front");
                    return;
                }
                if (e.target.closest("[data-lightbox-close]")) {
                    e.preventDefault();
                    closeLightbox();
                }
            });

            prevBtn.addEventListener("click", function () {
                flipSide("back");
            });
            nextBtn.addEventListener("click", function () {
                flipSide("front");
            });

            document.addEventListener("keydown", function (e) {
                if (lightbox.hidden) return;

                if (e.key === "Escape") {
                    e.preventDefault();
                    closeLightbox();
                    return;
                }
                if (!hasBoth()) return;

                if (e.key === "ArrowLeft" || e.key === "ArrowUp" || e.key === "b" || e.key === "B") {
                    e.preventDefault();
                    flipSide("back");
                    return;
                }
                if (e.key === "ArrowRight" || e.key === "ArrowDown" || e.key === "f" || e.key === "F") {
                    e.preventDefault();
                    flipSide("front");
                }
            });
        })();
    </script>
</body>
</html>
